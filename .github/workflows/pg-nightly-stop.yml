name: PG Nightly Stop/Start

# B1ms 24/7 → 야간 정지로 컴퓨트 비용 ~33% 절감 (전략 §3-A)
# 정지: 매일 KST 24:00 (= UTC 15:00)
# 기동: 매일 KST 08:00 (= UTC 23:00 전날)
# Azure Flexible Server는 7일 무활동 시 자동 기동 정책 — 8시간 정지는 안전 범위
#
# 수동 실행: workflow_dispatch action 입력 (start | stop)

on:
  schedule:
    - cron: '0 15 * * *'  # KST 24:00 stop
    - cron: '0 23 * * *'  # KST 08:00 start (UTC 23:00 전날)
  workflow_dispatch:
    inputs:
      action:
        description: '실행할 작업'
        required: true
        type: choice
        options:
          - stop
          - start

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-sohobi-prod
  PG_SERVER_NAME: sohobi-prod-pg

jobs:
  stop:
    if: github.event.schedule == '0 15 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'stop')
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_B }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_B }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_B }}

      - name: Stop PG Flexible Server
        run: |
          state=$(az postgres flexible-server show -g $AZURE_RESOURCE_GROUP -n $PG_SERVER_NAME --query state -o tsv)
          echo "Current state: $state"
          if [ "$state" = "Ready" ]; then
            az postgres flexible-server stop -g $AZURE_RESOURCE_GROUP -n $PG_SERVER_NAME
            echo "Stop initiated."
          else
            echo "Server not in Ready state — skip."
          fi

  start:
    if: github.event.schedule == '0 23 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'start')
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_B }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_B }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_B }}

      - name: Start PG Flexible Server
        run: |
          state=$(az postgres flexible-server show -g $AZURE_RESOURCE_GROUP -n $PG_SERVER_NAME --query state -o tsv)
          echo "Current state: $state"
          if [ "$state" = "Stopped" ]; then
            az postgres flexible-server start -g $AZURE_RESOURCE_GROUP -n $PG_SERVER_NAME
            echo "Start initiated."
          else
            echo "Server not in Stopped state — skip."
          fi
